name: Deploy CeremonyVerse

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install gdown
        run: pip install gdown
          
      - name: Download and extract zip from Google Drive
        run: |
          # Download using gdown (handles large files and virus scan warnings)
          gdown --id 1ifUjf8pgz8rB_jCEH0lnfb9uZtCSHFfN -O ceremonyverse.zip
          
          # Check if download was successful
          if [ ! -f ceremonyverse.zip ] || [ ! -s ceremonyverse.zip ]; then
            echo "Failed to download file"
            exit 1
          fi
          
          echo "Downloaded file size:"
          ls -lh ceremonyverse.zip
          
          # Check if it's a valid zip
          if ! unzip -t ceremonyverse.zip > /dev/null 2>&1; then
            echo "Downloaded file is not a valid zip"
            cat ceremonyverse.zip | head -20
            exit 1
          fi
          
          # Create a temporary directory for extraction
          mkdir -p temp_extract
          
          # Extract the zip
          unzip -o ceremonyverse.zip -d temp_extract/
          
          # List what was extracted
          echo "Extracted contents:"
          ls -la temp_extract/
          
          # Move files to root (handle both with and without wrapper directory)
          if [ -d "temp_extract/ceremonyverse" ]; then
            cp -r temp_extract/ceremonyverse/* .
          elif [ -d "temp_extract/CeremonyVerse" ]; then
            cp -r temp_extract/CeremonyVerse/* .
          else
            # Find the first directory and use it
            for dir in temp_extract/*/; do
              if [ -d "$dir" ]; then
                cp -r "$dir"/* .
                break
              fi
            done
          fi
          
          # Clean up
          rm -rf temp_extract ceremonyverse.zip
          
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Update site with latest version from Google Drive"
          git push